<div class="container mt-5">

    <h2 class="mb-4 text-center">Usuários</h2>

    <table class="table table-striped text-center">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Email</th>
                <th>Ações</th>
            </tr>
        </thead>

        <tbody>
            @for (usuario of usuarios; track $index) {
            <tr>
                <td>{{ usuario.nome }}</td>
                <td>{{ usuario.email }}</td>
            </tr>
            }
        </tbody>

    </table>

    <div class="text-center mt-3">
        <button class="btn btn-outline-secondary" routerLink="/home">
            Voltar
        </button>
    </div>

</div>
