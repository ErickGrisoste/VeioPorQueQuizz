<div class="container vh-100 d-flex align-items-center justify-content-center">

  <div class="card shadow-lg p-5 text-center" style="width: 500px;">

    <h1 class="mb-4">
      🎯 Resultado
    </h1>

    <h2 class="display-5 mb-3">
      {{ pontuacao }} / {{ totalPerguntas }}
    </h2>

    <p class="lead mb-4">
      {{ mensagem }}
    </p>

    <div class="d-grid gap-3">

      <button class="btn btn-primary btn-lg" routerLink="/quiz">
        Jogar Novamente
      </button>

      <button class="btn btn-outline-secondary btn-lg" routerLink="/ranking">
        Ver Ranking
      </button>

      <button class="btn btn-outline-dark btn-lg" routerLink="/avaliacao">
        Avalie nosso Quiz
      </button>

      <button class="btn btn-outline-dark btn-lg" routerLink="/home">
        Voltar para Home
      </button>

    </div>

  </div>

</div>
