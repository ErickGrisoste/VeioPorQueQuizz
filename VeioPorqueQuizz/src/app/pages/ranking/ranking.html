<div class="container vh-100 d-flex align-items-center justify-content-center">

  <div class="card shadow-lg p-4" style="width: 600px;">

    <h2 class="text-center mb-4">
      🏆 Ranking
    </h2>

    <table class="table table-striped text-center">

      <thead>
        <tr>
          <th>#</th>
          <th>Nome</th>
          <th>Pontos</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let jogador of ranking; let i = index">
          <td>{{ i + 1 }}</td>
          <td>{{ jogador.nome }}</td>
          <td>{{ jogador.pontos }}</td>
        </tr>
      </tbody>

    </table>

    <div class="d-grid gap-2 mt-3">
      <button class="btn btn-primary" routerLink="/quiz">
        Jogar novamente
      </button>

      <button class="btn btn-outline-secondary" routerLink="/home">
        Voltar para Home
      </button>
    </div>

  </div>

</div>
