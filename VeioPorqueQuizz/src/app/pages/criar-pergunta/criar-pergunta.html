<div class="container vh-100 d-flex align-items-center justify-content-center">

  <div class="card shadow-lg p-4" style="width:600px">

    <h2 class="text-center mb-4">
      Nova Pergunta
    </h2>

    <div class="mb-3">
      <label class="form-label">Pergunta</label>
      <input class="form-control" [(ngModel)]="pergunta">
    </div>

    <div *ngFor="let opcao of opcoes; let i = index; trackBy: trackByIndex" class="mb-3">

      <label class="form-label">
        Alternativa {{ i + 1 }}
      </label>

      <input class="form-control" [(ngModel)]="opcoes[i]" name="opcao_{{i}}">

      <div class="form-check mt-1">

        <input class="form-check-input" type="radio" name="correta" [value]="i" [(ngModel)]="respostaCorreta">

        <label class="form-check-label">
          Resposta correta
        </label>

      </div>

    </div>

    <div class="d-grid gap-2">

      <button class="btn btn-success" (click)="salvarPergunta()">
        Salvar Pergunta
      </button>

      <button class="btn btn-outline-secondary" routerLink="/home">
        Finalizar
      </button>

    </div>

  </div>

</div>
