<div class="container vh-100 d-flex align-items-center justify-content-center">

  <div class="card shadow-lg p-4" style="width:500px">

    <h2 class="text-center mb-4">
      Criar Novo Quiz
    </h2>

    <div class="mb-3">
      <label class="form-label">Título</label>
      <input class="form-control" [(ngModel)]="titulo">
    </div>

    <div class="mb-3">
      <label class="form-label">Descrição</label>
      <textarea class="form-control" [(ngModel)]="descricao"></textarea>
    </div>

    <div class="d-grid gap-2">

      <button class="btn btn-success" (click)="salvarQuiz()">
        Salvar Quiz
      </button>

      <button class="btn btn-primary" routerLink="/criar-pergunta">
        Adicionar Perguntas
      </button>

      <button class="btn btn-outline-secondary" routerLink="/home">
        Cancelar
      </button>

    </div>

  </div>

</div>
